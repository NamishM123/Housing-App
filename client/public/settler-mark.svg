  <!-- Right building block -->
  <rect x="162" y="128" width="52" height="56" stroke="black" stroke-width="3.5"/>
  <rect x="170" y="137" width="10" height="10" stroke="black" stroke-width="2.5"/>
  <rect x="185" y="137" width="10" height="10" stroke="black" stroke-width="2.5"/>
  <rect x="170" y="152" width="10" height="10" stroke="black" stroke-width="2.5"/>
  <rect x="185" y="152" width="10" height="10" stroke="black" stroke-width="2.5"/>
  <rect x="177" y="163" width="14" height="21" stroke="black" stroke-width="2.5"/>
</svg>
